name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Voikko system library and Finnish dictionary
        run: sudo apt-get update && sudo apt-get install -y libvoikko-dev voikko-fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio httpx
          pip install -r requirements.txt 2>/dev/null || pip install -r requirements-advanced.txt 2>/dev/null || true

      - name: Run tests
        run: pytest app/tests/ -v --tb=short -x
